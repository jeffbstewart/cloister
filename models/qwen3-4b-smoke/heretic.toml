# Heretic ablation profile for the toolchain smoke test. Trimmed trial budget so
# the whole pipeline finishes fast; a smoke run proves plumbing, not quality.
# 4B fits a 24 GB card unquantized.
quantization = "none"
n_trials = 40
n_startup_trials = 15
batch_size = 0
max_batch_size = 128
