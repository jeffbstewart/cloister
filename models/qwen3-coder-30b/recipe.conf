# Pilot recipe: liberate the stock Qwen3-Coder 30B-A3B (MoE) ourselves and
# A/B it against the downloaded huihui_ai/qwen3-coder-abliterated:30b.
# Sourced by liberate.sh.

# The STOCK base, so we own the abliteration end to end (not a re-liberation of
# someone else's upload). MoE, ~30B total / ~3B active.
BASE_MODEL="Qwen/Qwen3-Coder-30B-A3B-Instruct"

# Optional: pin an exact revision for reproducibility (git sha or tag on the HF
# repo). Left unpinned for the pilot; set before this becomes a served tag.
BASE_COMMIT=""

# Quantization target for llama-quantize. Q4_K_M matches the ~18.5 GB on-disk
# size of the coder tags already in the store, comfortably inside 24 GB VRAM.
QUANT="Q4_K_M"

# The ollama tag liberate.sh registers. Deliberately distinct from the
# downloaded huihui tag so both can sit in the store for the A/B.
OLLAMA_TAG="qwen3-coder-liberated:30b"
