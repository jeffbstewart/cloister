# Heretic ablation profile for the 30B-A3B coder pilot. liberate.sh copies this
# to config.toml in the run directory; `model`, `save_directory`, and
# `model_action` are supplied on the command line, so this file stays a reusable
# ablation profile, not a per-run script.
#
# See config.default.toml in the heretic repo for the full, documented set:
#   https://github.com/p-e-w/heretic/blob/master/config.default.toml

# 30B in bf16 (~60 GB) will not fit a 24 GB card. Load in 4-bit for the
# direction search; heretic reloads full precision on CPU to edit the weights.
quantization = "bnb_4bit"

# Optimizer budget. Defaults (200 trials / 60 startup) are thorough; keep them
# for a served model. Lower both for a quick parameter check on new hardware.
n_trials = 200
n_startup_trials = 60

# Auto-size the batch to available VRAM at startup.
batch_size = 0
max_batch_size = 128

# Co-minimized objectives, both on heretic's default calibration datasets
# (mlabonne/harmful_behaviors + harmless_alpaca). KeywordRate = refusals on
# harmful prompts; KLDivergence = drift from the original on harmless prompts.
# Left at heretic's defaults deliberately: the whole point is a MEASURED,
# reproducible build, and the defaults are what the published KL comparisons use.
