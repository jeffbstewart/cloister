# Copyright-header policy, embedded into copyright-lint (go:embed) and
# enforced by the pre-commit hook and CI.  Every tracked file needs a
# header unless excluded here; the owner's headers must show the submission
# year on any file a change touches ("YYYY" or "YYYY-YYYY"); any other
# holder's copyright is rejected unless its path matches a third_party
# pattern.
#
# Patterns are anchored, "/"-separated globs; "**" spans directories
# ("*.md" matches only at the root — use "**/*.md" for any depth).

owner: Jeffrey B. Stewart

exclude:
  # Prose and records: not source, no headers.
  - "**/*.md"
  - "LICENSE"
  - "NOTICE"
  - "THIRD_PARTY_NOTICES"
  # Generated / tool-owned metadata.
  - "go.mod"
  - "go.sum"
  # Fixtures must stay byte-exact for the code under test.
  - "**/testdata/**"
  # Dotfiles and plumbing with no meaningful authorship.
  - "**/.gitignore"
  - "**/.aiignore"
  - ".gitattributes"
  - "scripts/presubmit-allowlist.txt"

# Paths allowed to carry another holder's copyright (vendored code).  Such
# files satisfy the presence check with any copyright line and are never
# year-checked.  Empty today: nothing vendored.
third_party: []
