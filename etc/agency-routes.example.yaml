# Agency engine-class routing — TEMPLATE (docs/agency.md).
#
# Mount read-only into the agency container and start the door with
# `-config <path>`. FAIL-CLOSED: an unknown key, a missing field, or a chain
# link naming an unlisted node refuses startup — the door never routes on a
# table you did not choose.
#
# Consumers put a CLASS name in the request's `model` field, never a model
# tag or a URL; GET /v1/models lists the classes. An unavailable OR
# too-busy link means the next link in the chain; an exhausted chain is a
# refusal, never a silent substitute. Callers may tighten their budgets per
# request with the Agency-Deadline and Agency-Queue-Wait headers (Go
# duration strings, e.g. "45s") up to the class's maxima.

probe:
  interval: 15s   # how often every node is probed for presence; a node that
                  # leaves (a laptop, a desktop asleep) is skipped by chains
                  # until a probe sees it again — detection only, the door
                  # NEVER wakes a node
  timeout: 3s     # bound on one probe (GET /v1/models); unanswered = absent

nodes:
  # Addresses beyond the infra stack (a LAN node) belong here in your copy,
  # not in the repo.
  infer:
    url: http://infer:11434   # base URL, scheme://host[:port] only
    maxInFlight: 4            # requests the door lets run on this node at
                              # once; beyond it, requests wait in the door's
                              # two-class queue (interactive ahead of batch)
    models:                   # the CLOSED set of model tags allowed here —
                              # chains may only ask this node for these, so
                              # nothing routable can trigger an eviction.
                              # Use full tags as `ollama ls` shows them, and
                              # size the node's OLLAMA_MAX_LOADED_MODELS to
                              # hold the whole set. Probes assert the set
                              # against /api/ps and log drift.
      - coder-model:30b
      - tiny-model:3b

classes:
  interactive-code:
    priority: interactive  # interactive | batch: who queues ahead when a
                           # node slot frees
    deadline: 90s          # default total budget (queue + decode) when the
                           # caller sends no Agency-Deadline header
    maxDeadline: 10m       # hard cap; a caller asking past it is refused
    queueWait: 10s         # default per-link queue budget: waiting longer
                           # for a node slot advances the chain
    maxQueueWait: 1m       # hard cap on Agency-Queue-Wait asks
    chain:                 # ordered fallback: first reachable link serves
      - node: infer
        model: coder-model:30b   # the tag ollama knows on that node
  summarize-cheap:
    priority: batch
    deadline: 30s
    maxDeadline: 2m
    queueWait: 30s
    maxQueueWait: 2m
    chain:
      - node: infer
        model: tiny-model:3b
