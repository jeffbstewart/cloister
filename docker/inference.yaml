# ── Shared infrastructure stack ─────────────────────────────────────────────
# The GPU inference node, the agency (the sole inference door fronting it),
# and the localhost bridge. LONG-LIVED: deploy once and leave up (model
# reloads are expensive). It knows nothing about any project.
#
# Per-project cells (ai-workers.yaml) attach to the `infernet` network this
# stack publishes, to reach the `agency`. Deploy this first.
#
# Stack env vars:
#   MODELS_DIR    host directory holding ollama's model store (default
#                 c:/ai_models); see docs/GETTING_STARTED.md for staging it
#   AGENCY_IMAGE  the workers image serving the agency, e.g.
#                 cloister-workers:latest or a pinned cloister-workers:sha-<commit>
#   TZ            timezone for the agency's log timestamps (default UTC)

services:
  agency:
    # The sole inference door (docs/agency.md).  Phase 1: a streaming
    # OpenAI-compatible pass-through fronting `infer`, which holds no
    # consumer-reachable network of its own — cells dial
    # http://agency:11434/v1 and only /v1/ paths pass (ollama's native
    # API, pulls included, is unreachable through the door).
    image: ${REGISTRY:-ghcr.io/jeffbstewart}/${AGENCY_IMAGE:?set AGENCY_IMAGE, the workers image serving the agency, e.g. cloister-workers:latest}
    container_name: agency
    user: "1000:1000"
    restart: unless-stopped
    # The agency role link of the multi-call worker binary; -addr defaults
    # to the role's :11434.
    entrypoint: ["/usr/local/bin/agency"]
    command: ["-upstream", "http://infer:11434"]
    environment:
      - TZ=${TZ:-UTC}
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # rw: the door's status snapshot writer (docs/agency.md, phase 4).
      # Nothing is written until the door runs in routing mode with
      # -status-dir /status; cells' state services mount the same volume
      # read-only and render the Inference panel from it.
      - agency_status:/status
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "/usr/local/bin/agency", "-healthcheck"]
      interval: 30s
    networks:
      - infernet                         # consumers (cells) dial in here
      - modelnet                         # the only route to infer
  infer:
    image: ollama/ollama:0.24.0          # pin a version; avoid :latest for reproducibility
    container_name: infer
    user: "1000:1000"
    restart: unless-stopped

    # --- GPU passthrough -------------------------------------------------
    # Docker Desktop + WSL2 provides the plumbing; this reservation requests it.
    # (Compose v2 also accepts the shorthand `gpus: all` instead of this block.)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_MODELS=/models
      - OLLAMA_CONTEXT_LENGTH=32768
      # Never idle-unload: the agency pins which models may live here, so
      # nothing can evict a resident and a timeout unload would only re-buy
      # a cold load.  The agency preloads pinned models it finds cold; real
      # requests reset the keep-alive timer from this value, so it must be
      # -1 or the preload's pin is undone by the first caller.
      - OLLAMA_KEEP_ALIVE=-1
      - HOME=/home/ollama                # ephemeral, rebuilt on each launch
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    # --- filesystem: weights read-only; writable state in tmpfs ----------
    volumes:
      # Pre-staged weights (read-only): the hardened stack has no egress to
      # pull them.  MODELS_DIR is the host directory holding ollama's model
      # store; see docs/GETTING_STARTED.md for staging it.
      - "${MODELS_DIR:-c:/ai_models}:/models:ro"

    read_only: true                      # root filesystem read-only (defense in depth)
    tmpfs:
      - /tmp
      - /home/ollama:uid=1000,gid=1000,mode=0700

    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    networks:
      - modelnet                         # reachable ONLY via the agency; no consumer net

  proxy:
    image: alpine/socat:1.8.0.3
    container_name: agency-proxy
    restart: unless-stopped
    user: "65534:65534"                  # nobody
    # Fronts the AGENCY, not raw ollama: host smoke tests hit the same door
    # the cells do (GET /v1/models), and direct host access to the model
    # server is gone.  Model staging is unaffected — weights enter via the
    # host-side ollama store (docs/GETTING_STARTED.md).
    command: ["TCP-LISTEN:11434,fork,reuseaddr", "TCP:agency:11434"]
    ports:
      - "127.0.0.1:11434:11434"          # host reaches the agency for smoke tests
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    pids_limit: 64
    networks:
      - infernet
      - frontend

networks:
  infernet:
    internal: true                       # NO route to the internet => no egress
    name: infernet                       # stable name so per-project cells join as external
  modelnet:
    internal: true                       # agency <-> infer; the model server's ONLY edge
  frontend: {}

volumes:
  agency_status:
    name: agency_status                  # stable name: this stack creates it (like
                                         # infernet); cells mount it external + :ro.
                                         # Deploy this stack before any cell.
