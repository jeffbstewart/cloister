# ── Per-project cell stack ──────────────────────────────────────────────────
# One coding agent, all its workers, and a set of networks that enforce the
# structural safety requirements. Deploy one cell per project; attach to the
# shared infra stack's `infernet` (docker/inference.yaml) to reach `infer`.
#
# Stack env vars (Portainer).  Required vars carry a ${VAR:?message} guard at
# their first use, so a missing one fails the deploy naming the variable —
# not with docker's bare "invalid reference format".
#   PROJECT        short project id, e.g. myproject
#   WORKSPACE      host path of the project repo, e.g. c:/projects/myproject
#                  ── THE single source of truth for the workspace: defined once
#                     here, mounted into both agent and builder below.
#   WORKSPACE_UID  numeric uid that OWNS the workspace on the host; the
#   WORKSPACE_GID  scribe/builder/librarian all run as it, so writes are owned by
#                  the real user (no root-owned droppings) and the librarian can
#                  read a per-user 0700 tree.  e.g. 1000 / 1000.
#   BUILD_HOME     host dir for the builder's PERSISTENT toolchain caches (its
#                  HOME): per USER, shared across that user's projects.
#                  Pre-create it user-owned.  e.g. /srv/home/alice/.cloister-cache
#   SCRIBE_STATE   host dir for the scribe's durable approval staging: per
#                  PROJECT, pre-created user-owned.  e.g.
#                  /srv/home/alice/cells/myproject/scribe
#   AGENT_IMAGE    the jailed qwen-code image (THE "qwen image" — there is no
#                  separately named one).  Published by images.yml with the
#                  qwen version leading the tag: pin e.g.
#                  cloister-agent:0.19.4-sha-<commit>, or track :latest
#   BUILDER_IMAGE  e.g. cloister-builder:latest (the jdk25-gradle toolchain;
#                  a future second toolchain will need per-toolchain image
#                  names or toolchain-prefixed tags — one name holds one)
#   OPENAI_MODEL   a tag installed in infer, e.g. qwen3-coder:30b
#   STATE_TOKEN    shared builder<->state secret; per project, e.g. [guid]::NewGuid().ToString("N")
#   STATUS_PORT    host localhost port for the status pages (unique per project)
#   TZ             timezone for log timestamps AND the status pages, e.g.
#                  America/New_York (default UTC); applied to every container
#   KAGI_API_KEY   scholar's search/extract API token (Kagi). Set the account's
#                  custom billing limit LOW as a spend backstop.
#   SCHOLAR_POLICY host path of the read-only egress policy yaml (engine + deny list)
#   BRAVE_API_KEY  only if the policy sets search.engine: brave (else leave unset)
#
# The agent registers the builder, scribe, scholar, AND librarian MCP servers
# in /home/node/.qwen/settings.json (persisted in the qwen_home volume), plus a
# coreTools allowlist that excludes the built-in file mutators AND readers
# (source writes MUST go through the scribe; source reads MUST go through the
# librarian — the agent holds no workspace mount at all) and the built-in web
# tools (web access MUST go through the scholar). Project-agnostic service URLs:
#   { "mcpServers": {
#       "builder":   { "httpUrl": "http://builder:9200/mcp",   "timeout": 2400000 },
#       "scribe":    { "httpUrl": "http://scribe:9300/mcp",    "timeout": 2400000 },
#       "scholar":   { "httpUrl": "http://scholar:9500/mcp",   "timeout": 2400000 },
#       "librarian": { "httpUrl": "http://librarian:9400/mcp", "timeout": 2400000 } } }
#
# Least-privilege network map (every edge is a network hop or token-gated API):
#   agent   ── infernet ────> agency        agent   ── buildnet ─────> builder + scribe + librarian (MCP)
#   librarian ─ statenet ───> state (denial audit); ro workspace — the agent's ONLY source view
#   agent   ── researchnet ─> scholar (MCP)  scholar ── infernet ────> agency (model)
#   builder ── statenet ───> state (sink)    scribe  ── statenet ─────> state (audit + diffs)
#   scholar ── scholarstate > state (audit)  scholar ── kagiegress ──> kagi-relay ── egress ─> kagi.com
#   state   ── statepub ───> status relay    status  ── frontend ────> host publish
# So: all inference rides through the agency (raw `infer` sits behind it on the
# infra stack's private modelnet); infer never shares a net with builder/scribe;
# the agent cannot reach state;
# the scholar handles untrusted web content and has NO route to builder/scribe/
# workspace and NO `egress` net — only the kagi-relay touches the internet, pinned
# to kagi.com. Neither the state service, scribe, nor scholar holds open egress.

# Single-source workspace mount. The builder and scribe hold it rw (build outputs
# / audited source writes); the librarian holds it :ro and serves ALL source
# reads (shield-filtered, docs/librarian.md); the agent holds NO workspace mount
# at all — its cwd is a tmpfs stub, and both halves of source I/O are mediated:
# writes via the scribe, reads via the librarian.
x-workspace: &workspace "${WORKSPACE:?set WORKSPACE to the host path of the project repo}:/workspace"
x-workspace-ro: &workspace-ro "${WORKSPACE}:/workspace:ro"

# Every workspace-touching worker runs as the uid:gid that OWNS the workspace on
# the host, so its writes land owned by the real user — no root-owned droppings,
# and the librarian can read a per-user 0700 tree.  The state service is exempt:
# it touches no workspace and keeps its ledger in a Docker volume (harder to
# tamper with than a /srv file), so it stays on a fixed service uid.
x-workspace-user: &wsuser "${WORKSPACE_UID:?set WORKSPACE_UID to the uid owning the workspace, e.g. 1000}:${WORKSPACE_GID:?set WORKSPACE_GID, e.g. 1000}"

# Single-source timezone: referenced by every container's environment so log
# timestamps (and the status pages) read in the operator's local zone.
# Defaults to UTC.  tzdata is embedded in the Go binary, so any IANA zone works.
x-tz: &tz "TZ=${TZ:-UTC}"

services:
  agent:
    image: ${REGISTRY:-ghcr.io/jeffbstewart}/${AGENT_IMAGE:?set AGENT_IMAGE, e.g. cloister-agent:latest}
    container_name: ${PROJECT:?set PROJECT, the short project id}-agent
    user: "1000:1000"
    restart: unless-stopped
    # No entrypoint override: the image entrypoint registers the builder MCP
    # server, then execs this command. `sleep infinity` keeps the container
    # alive so you can `docker exec ... qwen` into an interactive session.
    command: ["sleep", "infinity"]
    environment:
      - *tz
      - OPENAI_BASE_URL=http://agency:11434/v1
      - OPENAI_API_KEY=ignored-for-local-use
      - OPENAI_MODEL=${OPENAI_MODEL:?set OPENAI_MODEL, the model the agent drives}
      # - BUILDER_MCP_URL=http://builder:9200/mcp   # default; override only for a nonstandard builder
    volumes:
      # Deliberately NO workspace mount: reads go through the librarian
      # (shield-filtered), writes through the scribe (audited, gated).
      - qwen_home:/home/node/.qwen       # persistent settings/history, node-owned
    working_dir: /workspace
    read_only: true
    tmpfs:
      - /tmp
      - /workspace:uid=1000,gid=1000,mode=0700   # cwd stub: holds the image-baked
                                                 # QWEN.md the entrypoint copies in;
                                                 # never reaches the project
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 512
    mem_limit: 2g
    networks:
      - infernet                         # reach the agency (shared infra stack)
      - buildnet                         # reach the builder MCP; NOT infer's peers
      - researchnet                      # reach the scholar MCP (research)

  builder:
    image: ${REGISTRY:-ghcr.io/jeffbstewart}/${BUILDER_IMAGE:?set BUILDER_IMAGE, e.g. cloister-builder:latest}
    container_name: ${PROJECT}-builder
    user: *wsuser
    restart: unless-stopped
    command: ["-worker-mode", "builder"]
    environment:
      - *tz
      - STATE_URL=http://state:9201
      - STATE_TOKEN=${STATE_TOKEN:?set STATE_TOKEN, the shared worker-to-state secret}
      - HOME=/home/build                 # writable cache home on the BUILD_HOME bind below
      - GRADLE_USER_HOME=/home/build/.gradle
    volumes:
      - *workspace                       # rw: SAME host dir as the agent; build outputs
      # The builder's HOME: persistent toolchain caches (go/gradle/npm/...), on a
      # USER-OWNED /srv bind so an arbitrary-uid builder can write them and they
      # survive restarts.  Per user, shared across that user's projects.
      - ${BUILD_HOME:?set BUILD_HOME, the user's persistent build-cache dir on /srv (pre-create it user-owned), e.g. /srv/home/alice/.cloister-cache}:/home/build
      # NOTE: deliberately NO /state mount — durable logs/audit are the state service's.
    working_dir: /workspace
    read_only: true
    tmpfs:
      - /tmp:size=2g
      # tmpfs ownership comes from the mount option, NOT the image chown (a
      # tmpfs is mounted fresh, root-owned, shadowing the image dir).  The
      # workspace uid/gid so the non-root builder can write its log spool.
      - /spool:size=512m,uid=${WORKSPACE_UID},gid=${WORKSPACE_GID},mode=0700
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 1024
    mem_limit: 8g
    healthcheck:
      test: ["CMD", "/usr/local/bin/agent-builder", "-healthcheck", "-addr", ":9200"]
      interval: 30s
    networks:
      - buildnet                         # reachable by agent (inbound MCP)
      - statenet                         # reach state (outbound sink); no egress

  scribe:
    image: ${REGISTRY:-ghcr.io/jeffbstewart}/${BUILDER_IMAGE}
    container_name: ${PROJECT}-scribe
    user: *wsuser
    restart: unless-stopped
    # Same binary, scribe mode: the sole audited writer of /workspace, serving
    # confined write ops as MCP tools on :9300 and auditing to the state service.
    # -scribe-approvals: build-logic / binary / non-UTF-8 writes are held
    # PENDING human approval on the status page instead of refused.
    command: ["-worker-mode", "scribe", "-addr", ":9300", "-workspace", "/workspace", "-scribe-approvals"]
    environment:
      - *tz
      - STATE_URL=http://state:9201
      - STATE_TOKEN=${STATE_TOKEN}
    volumes:
      - *workspace                       # rw: the scribe is the SOLE audited writer of source
      # Durable approval staging, on a USER-OWNED /srv bind (not a named volume)
      # so the arbitrary-uid scribe can write it; per project.
      - ${SCRIBE_STATE:?set SCRIBE_STATE, the scribe's durable approval-staging dir on /srv (pre-create it user-owned, per project), e.g. /srv/home/alice/cells/myproject/scribe}:/scribe-state
      # No /state mount (audits go over statenet); no /spool (diffs upload directly).
    working_dir: /workspace
    read_only: true
    tmpfs:
      - /tmp                             # atomic writes land in /workspace; /tmp is runtime scratch
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 512
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "/usr/local/bin/agent-builder", "-healthcheck", "-addr", ":9300"]
      interval: 30s
    networks:
      - buildnet                         # reachable by the agent (inbound MCP)
      - statenet                         # reach state (audit + diff store); internal -> no egress

  librarian:
    image: ${REGISTRY:-ghcr.io/jeffbstewart}/${BUILDER_IMAGE}
    container_name: ${PROJECT}-librarian
    user: *wsuser
    restart: unless-stopped
    # Same binary, librarian mode: the read side of the cell — mechanical read
    # tools AND inference-backed comprehension tools on :9400, served from an
    # in-memory, shield-filtered model of the workspace (docs/librarian.md).
    # Comprehension pushes only shield-cleared content to the agency over infernet;
    # with OPENAI_* unset the librarian still boots mechanical-only.  Read
    # DENIALS (only) are audited to state.
    command: ["-worker-mode", "librarian", "-addr", ":9400", "-workspace", "/workspace"]
    environment:
      - *tz
      - STATE_URL=http://state:9201
      - STATE_TOKEN=${STATE_TOKEN}
      - OPENAI_BASE_URL=http://agency:11434/v1
      - OPENAI_MODEL=${OPENAI_MODEL}
    volumes:
      - *workspace-ro                    # ro: the sole workspace view on the agent's side of the cell
    working_dir: /workspace
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 1g                        # in-memory model budget (256 MiB default) + headroom
    healthcheck:
      test: ["CMD", "/usr/local/bin/agent-builder", "-healthcheck", "-addr", ":9400"]
      interval: 30s
    networks:
      - buildnet                         # reachable by the agent (inbound MCP)
      - statenet                         # denial audits to state; internal -> no egress
      - infernet                         # reach the agency for the comprehension ops (shared infra stack)

  state:
    image: ${REGISTRY:-ghcr.io/jeffbstewart}/${BUILDER_IMAGE}
    container_name: ${PROJECT}-state
    user: "1000:1000"                    # fixed service uid: state touches no workspace; its ledger stays in a Docker volume
    restart: unless-stopped
    command: ["-worker-mode", "state-service", "-addr", ":9201", "-state-dir", "/state"]
    environment:
      - *tz
      - STATE_TOKEN=${STATE_TOKEN}
    volumes:
      - state:/state                     # rw: the SOLE owner of durable logs/audit/status
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 128
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "/usr/local/bin/agent-builder", "-healthcheck", "-addr", ":9201"]
      interval: 30s
    networks:
      - statenet                         # reachable by builder/scribe; internal -> no egress
      - scholarstate                     # reachable by the scholar (audit/approvals/transcripts)
      - statepub                         # reachable by the status relay only

  status:
    # The operator's web-based audit and approval endpoint: publishes the state
    # service's status pages (dashboard, audit tail, run logs, diffs) and the
    # /approvals page to localhost, via a relay that parses nothing.
    image: alpine/socat:1.8.0.3
    container_name: ${PROJECT}-status
    restart: unless-stopped
    user: "65534:65534"                  # nobody
    environment:
      - *tz
    command: ["TCP-LISTEN:9201,fork,reuseaddr", "TCP:state:9201"]
    ports:
      - "127.0.0.1:${STATUS_PORT:-9201}:9201"
    read_only: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 64
    mem_limit: 64m
    networks:
      - statepub                         # reach state
      - frontend                         # publish to host; parses nothing

  scholar:
    image: ${REGISTRY:-ghcr.io/jeffbstewart}/${BUILDER_IMAGE}
    container_name: ${PROJECT}-scholar
    user: "1000:1000"
    restart: unless-stopped
    # Same binary, scholar mode: a quarantined research service. Serves ONE MCP
    # tool research(query) on :9500 and internally drives a model (over the
    # agency's OpenAI API) with a FIXED three-tool menu (web_search / extract_url_as_markdown
    # / respond) whose only egress is Kagi via the kagi-relay. It handles UNTRUSTED
    # web content, so it holds no /workspace mount, no route to builder/scribe, and
    # no `egress` network — its sole internet path is the relay. On boot it
    # TCP-probes public IPs and refuses to start if any connect (fail-closed
    # self-check).
    command: ["-worker-mode", "scholar", "-addr", ":9500", "-policy", "/etc/scholar/policy.yaml"]
    environment:
      - *tz
      - STATE_URL=http://state:9201
      - STATE_TOKEN=${STATE_TOKEN}
      - OPENAI_BASE_URL=http://agency:11434/v1
      - OPENAI_API_KEY=ignored-for-local-use
      - OPENAI_MODEL=${OPENAI_MODEL}
      - KAGI_API_KEY=${KAGI_API_KEY:?set KAGI_API_KEY, the scholar search/extract token}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}       # only if the policy sets search.engine: brave
      - KAGI_RELAY_ADDR=kagi-relay:8443        # dialed instead of kagi.com; TLS SNI stays kagi.com
    volumes:
      - ${SCHOLAR_POLICY:?set SCHOLAR_POLICY to the host path of the egress policy yaml}:/etc/scholar/policy.yaml:ro   # read-only egress policy
      - scholar_burn:/burn                              # tiny writable burn ledger: timestamps only
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "/usr/local/bin/agent-builder", "-healthcheck", "-addr", ":9500"]
      interval: 30s
    networks:
      - researchnet                      # reachable by the agent ONLY (inbound MCP)
      - infernet                         # reach the model (via the agency); internal -> no internet
      - scholarstate                     # reach state (audit + approvals + transcripts).
                                         # NOT statenet: keeps the scholar off builder/scribe
      - kagiegress                       # to the kagi-relay ONLY (internal; no internet)

  kagi-relay:
    image: alpine/socat:1.8.0.3          # same image as the status relay
    container_name: ${PROJECT}-kagi-relay
    user: "65534:65534"                  # nobody
    restart: unless-stopped
    # The ONLY container holding the `egress` network. Hard-wired to Kagi: the
    # scholar dials kagi-relay:8443, socat forwards raw TCP to kagi.com:443. TLS
    # stays end-to-end (the relay pipes ciphertext); `fork` re-resolves per
    # connection so Kagi CDN rotation is handled.
    command: ["TCP-LISTEN:8443,fork,reuseaddr", "TCP:kagi.com:443"]
    environment:
      - *tz
    read_only: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 64
    mem_limit: 64m
    networks:
      - kagiegress                       # reachable by the scholar
      - egress                           # the ONLY container touching the internet

networks:
  infernet:
    external: true                       # shared infra stack's inference net
    name: infernet
  buildnet:
    internal: true                       # agent <-> builder
  statenet:
    internal: true                       # builder/scribe <-> state
  scholarstate:
    internal: true                       # scholar <-> state ONLY (not builder/scribe)
  statepub:
    internal: true                       # state <-> relay
  researchnet:
    internal: true                       # agent <-> scholar
  kagiegress:
    internal: true                       # scholar <-> kagi-relay (no internet)
  egress: {}                             # kagi-relay -> internet (ONLY the relay holds this)
  frontend: {}                           # relay's host-publish path

volumes:
  qwen_home:
  # The builder's caches (BUILD_HOME) and the scribe's staging (SCRIBE_STATE) are
  # now USER-OWNED /srv binds, not named volumes — an arbitrary-uid worker can't
  # write a root-initialized named volume.  Only the fixed-uid state service and
  # the agent/scholar keep named volumes.
  state:
    name: ${PROJECT}_builder_state
  scholar_burn:
    name: ${PROJECT}_scholar_burn
